<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archery Performance OS — Design Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=DM+Mono:wght@400;500&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg-base:     #06080B;
    --bg-surface:  #0B0E14;
    --bg-card:     #0F1219;
    --bg-elevated: #151922;
    --border:      #1C2030;
    --border-mid:  #242A3B;
    --accent:      #F97316;
    --accent-dim:  rgba(249,115,22,0.10);
    --accent-glow: rgba(249,115,22,0.22);
    --accent-border: rgba(249,115,22,0.22);
    --green:       #22C55E;
    --yellow:      #F59E0B;
    --blue:        #3B82F6;
    --text-hi:     #F0F4F8;
    --text-mid:    #7E8FA6;
    --text-lo:     #3C4A5C;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; overflow: hidden; }
  body { background: var(--bg-base); color: var(--text-hi); font-family: 'Figtree', sans-serif; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 4px; }

  /* Typography utils */
  .display { font-family: 'Barlow Condensed', sans-serif; }
  .mono    { font-family: 'DM Mono', monospace; }

  /* Grid noise background */
  .grid-bg {
    background-image:
      linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
    background-size: 44px 44px;
  }

  /* Glow */
  .text-glow { text-shadow: 0 0 24px var(--accent-glow); }
  .card-glow { box-shadow: 0 0 0 1px var(--accent-border), 0 8px 32px rgba(249,115,22,0.08); }
  .green-glow { box-shadow: 0 0 12px rgba(34,197,94,0.4); }

  /* Pulse animation */
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
    50%       { opacity: .7; transform: scale(.85); box-shadow: 0 0 0 4px rgba(34,197,94,0); }
  }
  .pulse-dot { animation: pulse-dot 1.8s ease-in-out infinite; }

  /* Staggered entrance */
  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .rise { animation: rise .45s cubic-bezier(.22,.61,.36,1) both; }
  .d0  { animation-delay: .04s; }
  .d1  { animation-delay: .08s; }
  .d2  { animation-delay: .12s; }
  .d3  { animation-delay: .16s; }
  .d4  { animation-delay: .20s; }
  .d5  { animation-delay: .24s; }
  .d6  { animation-delay: .28s; }
  .d7  { animation-delay: .32s; }
  .d8  { animation-delay: .36s; }

  /* Nav */
  .nav-item {
    display: flex; align-items: center; gap: 9px;
    padding: 7px 11px; border-radius: 7px; cursor: pointer;
    font-size: 12.5px; font-weight: 500; color: var(--text-mid);
    transition: background .15s, color .15s, border-color .15s;
    border: 1px solid transparent; position: relative; user-select: none;
  }
  .nav-item:hover { background: rgba(255,255,255,0.04); color: var(--text-hi); }
  .nav-item.active {
    background: var(--accent-dim); color: var(--accent);
    border-color: var(--accent-border);
  }
  .nav-item.active::before {
    content: ''; position: absolute; left: -1px; top: 20%; bottom: 20%;
    width: 3px; background: var(--accent); border-radius: 0 3px 3px 0;
  }

  /* Card base */
  .card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; transition: border-color .2s, box-shadow .2s;
  }
  .card:hover { border-color: var(--border-mid); }

  /* Section label */
  .sec-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; font-weight: 700; letter-spacing: .12em;
    text-transform: uppercase; color: var(--text-lo);
  }

  /* Score colors */
  .sc-X  { background:#F59E0B; color:#000; }
  .sc-10 { background:#FDE047; color:#000; }
  .sc-9  { background:#EF4444; color:#fff; }
  .sc-8  { background:#F87171; color:#fff; }
  .sc-7  { background:#DC2626; color:#fff; }
  .sc-6  { background:#B91C1C; color:#fff; }
  .sc-5  { background:#3B82F6; color:#fff; }
  .sc-4  { background:#60A5FA; color:#000; }
  .sc-3  { background:#BAE6FD; color:#000; }
  .sc-1  { background:#CBD5E1; color:#000; }
  .sc-M  { background:#151922; color:#4A5568; border:1px solid #242A3B; }

  /* Progress */
  .bar-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .bar-fill  { height: 100%; background: linear-gradient(90deg,#F97316,#FCD34D); border-radius:2px; transition: width .6s ease; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

// ─── Tiny SVG icon component ─────────────────────────────────────────────────
const Ic = ({ d, s = 15 }) => (
  <svg width={s} height={s} viewBox="0 0 24 24" fill="none"
    stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
    <path d={d} />
  </svg>
);

const I = {
  dash:   "M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z M9 22V12h6v10",
  target: "M12 22a10 10 0 100-20 10 10 0 000 20z M12 18a6 6 0 100-12 6 6 0 000 12z M12 14a2 2 0 100-4 2 2 0 000 4z",
  bolt:   "M13 2L3 14h9l-1 8 10-12h-9l1-8z",
  wrench: "M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z",
  trophy: "M8 21h8 M12 17v4 M17 3H7l-2 9h14l-2-9z M5 12s0 5 7 5 7-5 7-5",
  lane:   "M2 12h20 M2 6h20 M2 18h20",
  chart:  "M3 3h18v18H3z M3 9h18 M9 21V9",
  people: "M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2 M9 11a4 4 0 100-8 4 4 0 000 8z M23 21v-2a4 4 0 00-3-3.87 M16 3.13a4 4 0 010 7.75",
  eye:    "M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z M12 15a3 3 0 100-6 3 3 0 000 6z",
  cog:    "M12 15a3 3 0 100-6 3 3 0 000 6z M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z",
  logout: "M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4 M16 17l5-5-5-5 M21 12H9",
  chev:   "M9 18l6-6-6-6",
  note:   "M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z M14 2v6h6",
  up:     "M18 15l-6-6-6 6",
  down:   "M6 9l6 6 6-6",
  cal:    "M3 4h18v18H3V4z M16 2v4 M8 2v4 M3 10h18",
};

// ─── Data ────────────────────────────────────────────────────────────────────
const scores = [
  { d:'Feb 3', s:498 }, { d:'Feb 7', s:511 }, { d:'Feb 11', s:489 },
  { d:'Feb 14', s:534 }, { d:'Feb 18', s:528 }, { d:'Feb 22', s:547 },
  { d:'Feb 26', s:541 }, { d:'Mar 2', s:559 },
];
const ends = [
  { n:1, arrows:['X','10','9','9','8','7'],  total:54 },
  { n:2, arrows:['10','10','9','9','9','8'], total:55 },
  { n:3, arrows:['X','X','10','9','8','9'],  total:57, live:true },
];
const comps = [
  { name:'Winter Indoor WA 18', date:'Mar 1',  score:547, max:600, place:2 },
  { name:'Club Championship',   date:'Feb 15', score:534, max:600, place:1 },
  { name:'Regional Open',       date:'Jan 28', score:489, max:600, place:4 },
];
const bookings = [
  { lane:'Lane 3', time:'Today  18:00 – 19:30', purpose:'Training',         dist:'18m', now:true },
  { lane:'Lane 1', time:'Mar 9  10:00 – 11:30', purpose:'Competition Prep', dist:'18m' },
  { lane:'Lane 5', time:'Mar 11 17:00 – 18:30', purpose:'Coaching',         dist:'25m' },
];

// ─── Score dot ───────────────────────────────────────────────────────────────
const Dot = ({ v, sm }) => {
  const cls = `sc-${v}`;
  const sz = sm ? 'w-7 h-7 text-xs' : 'w-9 h-9 text-sm';
  return (
    <div className={`${cls} ${sz} mono rounded-full flex items-center justify-center`}
      style={{ fontWeight: 700, flexShrink: 0 }}>{v}</div>
  );
};

// ─── Score Chart ─────────────────────────────────────────────────────────────
const Chart = () => {
  const W=520, H=148, PL=36, PR=12, PT=16, PB=28;
  const cw = W-PL-PR, ch = H-PT-PB;
  const lo=460, hi=600;
  const pts = scores.map((d,i)=>({
    x: PL + i*(cw/(scores.length-1)),
    y: PT + ch - ((d.s-lo)/(hi-lo))*ch,
    ...d,
  }));
  const line = pts.map((p,i)=>`${i?'L':'M'} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ');
  const area = `${line} L ${pts[pts.length-1].x} ${H-PB} L ${pts[0].x} ${H-PB} Z`;
  const grids = [480,510,540,570,600];
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto'}}>
      <defs>
        <linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stopColor="#F97316" stopOpacity=".28"/>
          <stop offset="100%" stopColor="#F97316" stopOpacity="0"/>
        </linearGradient>
        <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      {grids.map(g=>{
        const y = PT+ch-((g-lo)/(hi-lo))*ch;
        return <g key={g}>
          <line x1={PL} y1={y} x2={W-PR} y2={y} stroke="#1C2030" strokeWidth="1"/>
          <text x={PL-6} y={y+3.5} textAnchor="end" fill="#3C4A5C" fontSize="9" fontFamily="DM Mono,monospace">{g}</text>
        </g>;
      })}
      <path d={area} fill="url(#ag)"/>
      <path d={line} fill="none" stroke="#F97316" strokeWidth="2.5"
        strokeLinecap="round" strokeLinejoin="round" filter="url(#glow)"/>
      {pts.map((p,i)=>(
        <g key={i}>
          <circle cx={p.x} cy={p.y} r="4.5" fill="#F97316" stroke="#0F1219" strokeWidth="2.5"/>
          <text x={p.x} y={H-PB+14} textAnchor="middle" fill="#3C4A5C" fontSize="8.5" fontFamily="DM Mono,monospace">{p.d}</text>
        </g>
      ))}
      {/* PB callout */}
      <circle cx={pts[7].x} cy={pts[7].y} r="7" fill="none" stroke="#F97316" strokeWidth="1" strokeDasharray="3 2.5"/>
      <rect x={pts[7].x-16} y={pts[7].y-22} width={44} height={14} rx="3" fill="rgba(249,115,22,0.15)" stroke="rgba(249,115,22,0.3)" strokeWidth="1"/>
      <text x={pts[7].x+6} y={pts[7].y-12} fill="#F97316" fontSize="9" fontFamily="DM Mono,monospace">PB 559</text>
    </svg>
  );
};

// ─── Sidebar ─────────────────────────────────────────────────────────────────
const Sidebar = ({ active, go }) => {
  const [open, setOpen] = useState({ archer:true, coach:false, admin:false });
  const toggle = k => setOpen(p=>({...p,[k]:!p[k]}));

  const Section = ({ id, label, items }) => (
    <div style={{marginBottom:2}}>
      <button onClick={()=>toggle(id)} style={{
        display:'flex',alignItems:'center',justifyContent:'space-between',
        width:'100%',padding:'5px 12px',background:'none',border:'none',cursor:'pointer',
      }}>
        <span className="sec-label">{label}</span>
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#3C4A5C" strokeWidth="2.5"
          style={{transform:open[id]?'rotate(90deg)':'rotate(0)',transition:'transform .2s'}}>
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </button>
      {open[id] && (
        <div style={{paddingLeft:4}}>
          {items.map(it=>(
            <div key={it.id} className={`nav-item ${active===it.id?'active':''}`} onClick={()=>go(it.id)}>
              <Ic d={I[it.icon]} s={13}/>
              <span>{it.label}</span>
              {it.badge && (
                <span className="mono" style={{
                  marginLeft:'auto',background:'var(--accent)',color:'#000',
                  borderRadius:10,padding:'1px 6px',fontSize:9,fontWeight:700,letterSpacing:.5,
                }}>{it.badge}</span>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );

  return (
    <div style={{
      width:230, flexShrink:0, background:'var(--bg-surface)',
      borderRight:'1px solid var(--border)',
      display:'flex',flexDirection:'column',position:'relative',overflow:'hidden',
    }}>
      {/* Decorative target rings */}
      {[220,160,110,70].map((sz,i)=>(
        <div key={i} style={{
          position:'absolute',bottom:-(sz*.35),right:-(sz*.35),
          width:sz,height:sz,borderRadius:'50%',
          border:'1px solid #F97316',
          opacity:.025 - i*.002,pointerEvents:'none',
        }}/>
      ))}

      {/* Logo */}
      <div style={{padding:'18px 16px 14px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:10}}>
        <div style={{
          width:34,height:34,borderRadius:9,flexShrink:0,
          background:'linear-gradient(135deg,#F97316 0%,#C2410C 100%)',
          display:'flex',alignItems:'center',justifyContent:'center',
          boxShadow:'0 0 20px rgba(249,115,22,0.28)',
        }}>
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="9"  stroke="rgba(255,255,255,.25)" strokeWidth="1.5"/>
            <circle cx="12" cy="12" r="5.5" stroke="rgba(255,255,255,.45)" strokeWidth="1.5"/>
            <circle cx="12" cy="12" r="2.2" fill="white"/>
          </svg>
        </div>
        <div>
          <div className="display" style={{fontWeight:900,fontSize:14,letterSpacing:1.5,textTransform:'uppercase',color:'var(--text-hi)'}}>Archery OS</div>
          <div style={{fontSize:9.5,color:'var(--text-lo)',letterSpacing:.5,marginTop:1}}>Performance Platform</div>
        </div>
      </div>

      {/* Archer profile chip */}
      <div style={{margin:'12px 10px 6px',padding:'10px 12px',background:'var(--accent-dim)',border:'1px solid var(--accent-border)',borderRadius:9}}>
        <div style={{display:'flex',alignItems:'center',gap:9}}>
          <div style={{
            width:30,height:30,borderRadius:'50%',flexShrink:0,
            background:'linear-gradient(135deg,#F97316,#DC2626)',
            display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:11,fontWeight:800,color:'#fff',fontFamily:'Barlow Condensed,sans-serif',
          }}>JD</div>
          <div>
            <div style={{fontSize:12.5,fontWeight:600,color:'var(--text-hi)'}}>James Davies</div>
            <div className="display" style={{fontSize:10,fontWeight:700,color:'var(--accent)',letterSpacing:1,textTransform:'uppercase'}}>Senior Recurve</div>
          </div>
        </div>
      </div>

      {/* Navigation */}
      <div style={{flex:1,overflowY:'auto',padding:'6px 6px 6px'}}>
        <div className={`nav-item ${active==='dashboard'?'active':''}`} onClick={()=>go('dashboard')} style={{marginBottom:6}}>
          <Ic d={I.dash} s={13}/><span>Dashboard</span>
        </div>

        <Section id="archer" label="Archer" items={[
          {id:'live',    label:'Live Scoring',     icon:'target', badge:'LIVE'},
          {id:'train',   label:'Training Sessions', icon:'bolt'},
          {id:'equip',   label:'Equipment',         icon:'wrench'},
          {id:'comp',    label:'Competitions',      icon:'trophy'},
          {id:'lanes',   label:'Lane Bookings',     icon:'lane'},
          {id:'reports', label:'Reports',           icon:'chart'},
        ]}/>

        <Section id="coach" label="Coach" items={[
          {id:'archers', label:'My Archers',    icon:'people'},
          {id:'monitor', label:'Live Monitor',  icon:'eye'},
          {id:'notes',   label:'Coach Notes',   icon:'note'},
        ]}/>

        <Section id="admin" label="Club Admin" items={[
          {id:'members',  label:'Members',       icon:'people'},
          {id:'a-lanes',  label:'Lane Mgmt',     icon:'lane'},
          {id:'a-comp',   label:'Competitions',  icon:'trophy'},
          {id:'a-report', label:'Club Reports',  icon:'chart'},
        ]}/>
      </div>

      {/* Footer */}
      <div style={{padding:'10px 6px',borderTop:'1px solid var(--border)',display:'flex',gap:4}}>
        <div className="nav-item" style={{flex:1}}><Ic d={I.cog} s={13}/><span>Settings</span></div>
        <div className="nav-item" style={{padding:'7px 10px'}}><Ic d={I.logout} s={13}/></div>
      </div>
    </div>
  );
};

// ─── Stat card ───────────────────────────────────────────────────────────────
const Stat = ({ label, value, sub, delta, color='#F97316', cls='' }) => (
  <div className={`card rise ${cls}`} style={{padding:'16px 18px',position:'relative',overflow:'hidden'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
      <span className="display" style={{fontSize:10,fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--text-lo)'}}>
        {label}
      </span>
      {delta !== undefined && (
        <span className="mono" style={{
          display:'flex',alignItems:'center',gap:2,fontSize:10.5,
          color: delta>=0 ? '#22C55E' : '#EF4444',
        }}>
          <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3">
            <path d={delta>=0?"M18 15l-6-6-6 6":"M6 9l6 6 6-6"}/>
          </svg>
          {Math.abs(delta)}
        </span>
      )}
    </div>
    <div className="display text-glow" style={{fontWeight:800,fontSize:40,lineHeight:1,color,letterSpacing:-1}}>
      {value}
    </div>
    {sub && <div className="mono" style={{fontSize:10.5,color:'var(--text-lo)',marginTop:5}}>{sub}</div>}
    <div style={{position:'absolute',bottom:0,left:0,right:0,height:2,background:`linear-gradient(90deg,${color}55,transparent)`}}/>
  </div>
);

// ─── Live Score Card ──────────────────────────────────────────────────────────
const LiveCard = () => {
  const total = ends.reduce((s,e)=>s+e.total,0);
  const xs  = ends.flatMap(e=>e.arrows).filter(a=>a==='X').length;
  const ts  = ends.flatMap(e=>e.arrows).filter(a=>a==='10').length;
  const avg = (total / (ends.length*6)).toFixed(1);

  return (
    <div className="card rise d2" style={{padding:20,position:'relative',overflow:'hidden'}}>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div className="pulse-dot" style={{
            width:8,height:8,borderRadius:'50%',background:'#22C55E',
            boxShadow:'0 0 8px rgba(34,197,94,.7)',flexShrink:0,
          }}/>
          <span className="display" style={{fontWeight:900,fontSize:13,textTransform:'uppercase',letterSpacing:2,color:'#22C55E'}}>
            Live Session
          </span>
        </div>
        <div className="mono" style={{
          fontSize:10.5,color:'var(--text-mid)',
          background:'var(--bg-elevated)',border:'1px solid var(--border)',
          borderRadius:5,padding:'3px 9px',
        }}>WA 18 · 18 m · End 3 / 10</div>
      </div>

      {/* Big total + counters */}
      <div style={{display:'flex',alignItems:'flex-end',gap:24,marginBottom:18}}>
        <div>
          <div className="display" style={{fontSize:9,fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--text-lo)',marginBottom:4}}>Running Total</div>
          <div className="display text-glow" style={{fontWeight:900,fontSize:58,lineHeight:1,color:'#F97316',letterSpacing:-2}}>
            {total}
            <span style={{fontSize:22,color:'var(--text-lo)',fontWeight:400}}>/180</span>
          </div>
        </div>
        <div style={{display:'flex',gap:16,paddingBottom:6}}>
          {[{v:xs,l:'X',c:'#F59E0B'},{v:ts,l:'10s',c:'#FDE047'},{v:avg,l:'avg',c:'var(--text-mid)'}].map(({v,l,c})=>(
            <div key={l} style={{textAlign:'center'}}>
              <div className="mono" style={{fontSize:24,fontWeight:600,color:c,lineHeight:1}}>{v}</div>
              <div className="display" style={{fontSize:9,fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--text-lo)',marginTop:2}}>{l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Ends list */}
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        {ends.map(e=>(
          <div key={e.n} style={{
            display:'flex',alignItems:'center',gap:10,padding:'9px 12px',
            borderRadius:8,border:'1px solid',
            background: e.live ? 'rgba(249,115,22,.07)' : 'transparent',
            borderColor: e.live ? 'rgba(249,115,22,.22)' : 'transparent',
            transition:'all .2s',
          }}>
            <span className="mono" style={{fontSize:10.5,color:'var(--text-lo)',width:20,flexShrink:0}}>E{e.n}</span>
            <div style={{display:'flex',gap:4,flex:1}}>
              {e.arrows.map((a,j)=><Dot key={j} v={a} sm/>)}
            </div>
            <span className="mono" style={{
              fontSize:15,fontWeight:500,width:24,textAlign:'right',flexShrink:0,
              color: e.live ? '#F97316' : 'var(--text-mid)',
            }}>{e.total}</span>
          </div>
        ))}
        {/* Empty next end slots */}
        <div style={{
          display:'flex',alignItems:'center',gap:10,padding:'9px 12px',
          borderRadius:8,border:'1px dashed var(--border)',opacity:.5,
        }}>
          <span className="mono" style={{fontSize:10.5,color:'var(--text-lo)',width:20}}>E4</span>
          <div style={{display:'flex',gap:4}}>
            {[...Array(6)].map((_,j)=>(
              <div key={j} className="sc-M" style={{width:28,height:28,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'var(--text-lo)'}}>—</div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

// ─── Equipment Card ───────────────────────────────────────────────────────────
const EquipCard = () => (
  <div className="card rise d3" style={{padding:20}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
      <span className="display" style={{fontWeight:800,fontSize:13,textTransform:'uppercase',letterSpacing:2,color:'var(--text-mid)'}}>Current Setup</span>
      <span className="display" style={{
        fontSize:9,fontWeight:700,letterSpacing:1,textTransform:'uppercase',color:'#22C55E',
        background:'rgba(34,197,94,.1)',border:'1px solid rgba(34,197,94,.22)',
        borderRadius:4,padding:'2px 7px',
      }}>Active</span>
    </div>

    <div style={{marginBottom:14}}>
      <div className="display" style={{fontWeight:800,fontSize:18,color:'var(--text-hi)',letterSpacing:.3}}>Hoyt Formula Xi · 68"</div>
      <div className="mono" style={{fontSize:10.5,color:'var(--text-lo)',marginTop:3}}>Recurve · Indoor Setup</div>
    </div>

    {[
      ['Draw Weight','38 lbs','#F97316'],
      ['Draw Length','28.5"','var(--text-mid)'],
      ['Arrow','Easton X10 · 700','var(--text-mid)'],
      ['Spine','700','var(--text-mid)'],
    ].map(([lbl,val,c])=>(
      <div key={lbl} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid var(--border)'}}>
        <span className="display" style={{fontSize:10.5,fontWeight:700,textTransform:'uppercase',letterSpacing:'.07em',color:'var(--text-lo)'}}>{lbl}</span>
        <span className="mono" style={{fontSize:11.5,fontWeight:500,color:c}}>{val}</span>
      </div>
    ))}

    <div style={{marginTop:16}}>
      <div className="display" style={{fontSize:9.5,fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--text-lo)',marginBottom:10}}>Tuning</div>
      {[['Tiller',88],['Brace Height',74],['String Align',95]].map(([lbl,v])=>(
        <div key={lbl} style={{marginBottom:9}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
            <span className="display" style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',color:'var(--text-mid)'}}>{lbl}</span>
            <span className="mono" style={{fontSize:10,color:'#F97316'}}>{v}%</span>
          </div>
          <div className="bar-track"><div className="bar-fill" style={{width:`${v}%`}}/></div>
        </div>
      ))}
    </div>
  </div>
);

// ─── Chart Card ───────────────────────────────────────────────────────────────
const ChartCard = () => {
  const [range, setRange] = useState('30d');
  return (
    <div className="card rise d4" style={{padding:20}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <span className="display" style={{fontWeight:800,fontSize:13,textTransform:'uppercase',letterSpacing:2,color:'var(--text-mid)'}}>Score Progression</span>
        <div style={{display:'flex',gap:5}}>
          {['7d','30d','90d','All'].map(r=>(
            <button key={r} onClick={()=>setRange(r)} className="mono" style={{
              fontSize:10.5,padding:'3px 10px',borderRadius:5,cursor:'pointer',
              background: range===r ? 'rgba(249,115,22,.15)' : 'transparent',
              border:`1px solid ${range===r ? 'rgba(249,115,22,.3)' : 'var(--border)'}`,
              color: range===r ? '#F97316' : 'var(--text-lo)',
            }}>{r}</button>
          ))}
        </div>
      </div>
      <Chart/>
    </div>
  );
};

// ─── Bookings Card ────────────────────────────────────────────────────────────
const BookingsCard = () => (
  <div className="card rise d5" style={{padding:20}}>
    <div className="display" style={{fontWeight:800,fontSize:13,textTransform:'uppercase',letterSpacing:2,color:'var(--text-mid)',marginBottom:14}}>
      Upcoming Bookings
    </div>
    {bookings.map((b,i)=>(
      <div key={i} style={{
        display:'flex',alignItems:'center',gap:12,padding:'10px 0',
        borderBottom: i<bookings.length-1 ? '1px solid var(--border)' : 'none',
      }}>
        <div style={{
          width:36,height:36,borderRadius:8,flexShrink:0,
          background: b.now ? 'rgba(249,115,22,.12)' : 'var(--bg-elevated)',
          border:`1px solid ${b.now ? 'rgba(249,115,22,.28)' : 'var(--border)'}`,
          display:'flex',alignItems:'center',justifyContent:'center',
        }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
            stroke={b.now?'#F97316':'#3C4A5C'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M2 12h20 M2 6h20 M2 18h20"/>
          </svg>
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:12.5,fontWeight:600,color:b.now?'var(--text-hi)':'var(--text-mid)',display:'flex',alignItems:'baseline',gap:6}}>
            {b.lane}
            <span className="mono" style={{fontSize:9.5,color:'var(--text-lo)'}}>{b.dist}</span>
          </div>
          <div className="mono" style={{fontSize:10.5,color:'var(--text-lo)',marginTop:1}}>{b.time}</div>
        </div>
        <div className="display" style={{
          fontSize:9,fontWeight:700,letterSpacing:1,textTransform:'uppercase',flexShrink:0,
          color: b.now ? '#F97316' : 'var(--text-lo)',
          background: b.now ? 'rgba(249,115,22,.1)' : 'var(--bg-elevated)',
          border:`1px solid ${b.now ? 'rgba(249,115,22,.22)' : 'var(--border)'}`,
          borderRadius:4,padding:'2px 7px',
        }}>{b.purpose}</div>
      </div>
    ))}
  </div>
);

// ─── Competitions Card ────────────────────────────────────────────────────────
const CompsCard = () => {
  const pc = p => p===1?'#F59E0B':p===2?'#94A3B8':p===3?'#CD7C2F':'var(--text-lo)';
  const pl = p => ['','1st','2nd','3rd','4th'][p]||`${p}th`;
  return (
    <div className="card rise d6" style={{padding:20}}>
      <div className="display" style={{fontWeight:800,fontSize:13,textTransform:'uppercase',letterSpacing:2,color:'var(--text-mid)',marginBottom:14}}>
        Recent Competitions
      </div>
      {comps.map((c,i)=>(
        <div key={i} style={{padding:'10px 0',borderBottom:i<comps.length-1?'1px solid var(--border)':'none'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
            <div>
              <div style={{fontSize:12.5,fontWeight:600,color:'var(--text-hi)'}}>{c.name}</div>
              <div className="mono" style={{fontSize:10,color:'var(--text-lo)',marginTop:1}}>{c.date}</div>
            </div>
            <div className="display" style={{
              fontWeight:800,fontSize:13,flexShrink:0,
              color:pc(c.place),background:`${pc(c.place)}18`,
              border:`1px solid ${pc(c.place)}35`,
              borderRadius:6,padding:'2px 9px',
            }}>{pl(c.place)}</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div className="bar-track" style={{flex:1}}>
              <div className="bar-fill" style={{width:`${(c.score/c.max)*100}%`}}/>
            </div>
            <span className="mono" style={{fontSize:11.5,flexShrink:0}}>
              <span style={{color:'#F97316',fontWeight:500}}>{c.score}</span>
              <span style={{color:'var(--text-lo)'}}>/{c.max}</span>
            </span>
          </div>
        </div>
      ))}
    </div>
  );
};

// ─── App Shell ────────────────────────────────────────────────────────────────
const App = () => {
  const [active, setActive] = useState('dashboard');
  return (

      <Sidebar active={active} go={setActive}/>

      {/* Main */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>

        {/* Topbar */}
        <div style={{
          height:56,flexShrink:0,
          background:'var(--bg-surface)',
          borderBottom:'1px solid var(--border)',
          display:'flex',alignItems:'center',
          padding:'0 22px',gap:14,
        }}>
          <div style={{flex:1}}>
            <div className="display" style={{fontWeight:900,fontSize:17,textTransform:'uppercase',letterSpacing:2.5,color:'var(--text-hi)'}}>
              Dashboard
            </div>
          </div>

          {/* Live pill */}
          <div style={{
            display:'flex',alignItems:'center',gap:7,
            background:'rgba(34,197,94,.07)',
            border:'1px solid rgba(34,197,94,.18)',
            borderRadius:20,padding:'5px 13px',
          }}>
            <div className="pulse-dot" style={{width:6,height:6,borderRadius:'50%',background:'#22C55E',boxShadow:'0 0 7px rgba(34,197,94,.8)'}}/>
            <span className="display" style={{fontWeight:800,fontSize:10.5,textTransform:'uppercase',letterSpacing:1.8,color:'#22C55E'}}>
              Session Active
            </span>
          </div>

          <div className="mono" style={{fontSize:11,color:'var(--text-lo)'}}>Sat 07 Mar 2026</div>

          <div style={{
            width:32,height:32,borderRadius:'50%',
            background:'linear-gradient(135deg,#F97316,#DC2626)',
            display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:11,fontWeight:800,color:'#fff',
            fontFamily:'Barlow Condensed,sans-serif',
            boxShadow:'0 0 14px rgba(249,115,22,.3)',cursor:'pointer',
          }}>JD</div>
        </div>

        {/* Scrollable body */}
        <div className="grid-bg" style={{flex:1,overflowY:'auto',padding:'18px 20px',display:'flex',flexDirection:'column',gap:14}}>

          {/* Stats row */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
            <Stat label="Personal Best"      value="559" sub="WA 18 · Mar 2"       delta={18}  cls="d0"/>
            <Stat label="Sessions / Month"   value="12"  sub="↑ 3 vs last month"   delta={3}   cls="d1"/>
            <Stat label="Avg Score"          value="521" sub="Last 8 sessions"      delta={12}  cls="d2"/>
            <Stat label="X Count (Month)"    value="43"  sub="10s: 78"                          cls="d3" color="#F59E0B"/>
          </div>

          {/* Live + Equipment */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 272px',gap:12}}>
            <LiveCard/>
            <EquipCard/>
          </div>

          {/* Chart */}
          <ChartCard/>

          {/* Bookings + Comps */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <BookingsCard/>
            <CompsCard/>
          </div>

        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
